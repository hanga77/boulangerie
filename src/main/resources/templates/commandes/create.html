</head>

<!-- Contenu principal -->
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0"><i class="fas fa-plus-circle me-2"></i>Créer une Commande</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/commandes}" th:object="${commandeDTO}" method="post" id="commandeForm">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="dateCommande" class="form-label">Date de la Commande:</label>
                        <input type="date" id="dateCommande" th:field="*{dateCommande}" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <label for="pointDeVente" class="form-label">Point de Vente:</label>
                        <input type="text" id="pointDeVente" th:field="*{pointDeVente}" class="form-control" required />
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header bg-light">
                        <h3 class="h5 mb-0">Sélection des Produits</h3>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <button type="button" class="btn btn-secondary" id="addProduct">
                                    <i class="fas fa-plus me-2"></i>Ajouter un produit
                                </button>
                            </div>
                        </div>
                        <div id="produitsContainer">
                            <!-- Les produits seront ajoutés ici dynamiquement -->
                        </div>
                    </div>
                </div>

                <!-- Champs cachés pour la Map -->
                <div id="hiddenInputsContainer"></div>

                <div class="d-flex justify-content-between">
                    <a href="/commandes" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Retour
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Enregistrer
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- Template pour la ligne de produit -->
<template id="produitTemplate">
    <div class="row mb-3 produit-ligne">
        <div class="col-md-6">
            <select class="form-select produit-select" required>
                <option value="">Sélectionner un produit</option>
                <option th:each="produit : ${produits}"
                        th:value="${produit.id}"
                        th:text="${produit.nom}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="number"
                   class="form-control produit-quantite"
                   min="1"
                   value="1"
                   required
                   placeholder="Quantité" />
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-danger remove-product">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </div>
</template>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const produitsContainer = document.getElementById('produitsContainer');
        const hiddenInputsContainer = document.getElementById('hiddenInputsContainer');
        let productIndex = 0;

        // Fonction pour ajouter un produit
        document.getElementById('addProduct').addEventListener('click', function() {
            const template = document.getElementById('produitTemplate');
            const clone = template.content.cloneNode(true);
            produitsContainer.appendChild(clone);

            // Ajouter les événements
            const row = produitsContainer.lastElementChild;
            const select = row.querySelector('.produit-select');
            const quantityInput = row.querySelector('.produit-quantite');

            row.querySelector('.remove-product').addEventListener('click', function() {
                row.remove();
                updateHiddenInputs();
            });

            select.addEventListener('change', updateHiddenInputs);
            quantityInput.addEventListener('change', updateHiddenInputs);

            productIndex++;
        });

        // Fonction pour mettre à jour les inputs cachés
        function updateHiddenInputs() {
            hiddenInputsContainer.innerHTML = ''; // Nettoyer les anciens inputs

            produitsContainer.querySelectorAll('.produit-ligne').forEach(row => {
                const select = row.querySelector('.produit-select');
                const quantityInput = row.querySelector('.produit-quantite');

                if (select.value && quantityInput.value) {
                    const hiddenInput = document.createElement('input');
                    hiddenInput.type = 'hidden';
                    hiddenInput.name = `produitsCommandes[${select.value}]`;
                    hiddenInput.value = quantityInput.value;
                    hiddenInputsContainer.appendChild(hiddenInput);
                }
            });
        }

        // Ajouter le premier produit automatiquement
        document.getElementById('addProduct').click();

        // Gérer la soumission du formulaire
        document.getElementById('commandeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            updateHiddenInputs();
            this.submit();
        });
    });

</script>

<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
