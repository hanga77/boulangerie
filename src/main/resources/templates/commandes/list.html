<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Liste des Commandes')}">
</head>
<body>
<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<!-- Contenu principal -->
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">Liste des Commandes</h1>
        <div>
            <a href="/commandes/new" class="btn btn-primary me-2">
                <i class="fas fa-plus me-1"></i>Nouvelle commande
            </a>
            <a href="/production/passer-a-la-production" class="btn btn-success">
                <i class="fas fa-industry me-1"></i>Démarrer la production
            </a>
        </div>
    </div>
    <a th:if="${!#lists.isEmpty(commandes)}" th:href="@{/commandes/non-traitees}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="fa-solid fa-list me-1"></i>Commandes non traitées
    </a>
    <!-- Tableau des commandes -->
    <div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Date</th>
            <th>Point de Vente</th>
            <th>Coût Total</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="commande, iterStat : ${commandes}" th:if="${iterStat.index >= (currentPage * size) and iterStat.index < ((currentPage + 1) * size)}">
            <td th:text="${commande.dateCommande}"></td>
            <td th:text="${commande.pointDeVente}"></td>
            <td th:text="${commande.coutTotal + ' XAF'}"></td>
            <td>
                <a th:if="${commande.processed.equals(false)}" th:href="@{/commandes/edit/{id}(id=${commande.id})}" class="btn btn-warning btn-sm"><i class="fas fa-edit me-1"></i>Modifier</a>
                <a th:if="${commande.processed.equals(true)}" class="btn btn-secondary btn-sm disabled">Traitée</a>
                <form th:if="${commande.processed.equals(false)}"
                      th:action="@{/commandes/delete/{id}(id=${commande.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer cette commande ?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="fas fa-trash me-1"></i>Supprimer
                    </button>
                </form>
                <a th:href="@{/commandes/view/{id}(id=${commande.id})}" class="btn btn-info btn-sm"><i class="fas fa-eye me-1"></i>Voir</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>

    <!-- Pagination -->
    <nav aria-label="Page navigation" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/commandes(page=${currentPage - 1}, size=${size})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/commandes(page=${i}, size=${size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/commandes(page=${currentPage + 1}, size=${size})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>

</div>


<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
