<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Détails de la Commande')}">
</head>
<body>
<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<!-- Contenu principal -->
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0"><i class="fas fa-eye me-2"></i><span th:text="${'Commande de ' + commande.pointDeVente}"></span><a th:href="@{/commande/imprimer(id=${commande.id})}" class="btn btn-outline-light float-end">
                <i class="fas fa-print"></i> Imprimer
            </a></h1>

        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label" >Date de la Commande:</label>
                    <p th:text="${commande.dateCommande}"></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Point de Vente:</label>
                    <p th:text="${commande.pointDeVente}"></p>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header bg-light">
                    <h3 class="h5 mb-0">Produits Commandés</h3>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Produit</th>
                            <th>Quantité</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produit : ${produitsAvecNoms}">
                            <td th:text="${produit.key.nom}"></td>
                            <td th:text="${produit.value}"></td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr>
                            <th>Total</th>
                            <th th:text="${commande.coutTotal +' XAF'}"> </th>
                        </tr>
                        </tfoot>
                    </table>

                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/commandes" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Retour
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
