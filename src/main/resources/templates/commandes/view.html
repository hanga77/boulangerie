<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <title>Détails de la Commande</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pour les icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Styles personnalisés -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-bread-slice me-2"></i>Boulangerie Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link " href="/dashboard">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/matieres-premieres">Matières Premières</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/produits">Produits</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/commandes">Commandes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/livraisons">Livraisons</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/production">Productions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/#">Finances</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/mouvements">
                        <i class="fas fa-warehouse me-1"></i>Mouvements de Stock
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin/users">Admin</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BOULANGER')">
                    <a class="nav-link" href="/Boulanger">Boulanger</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIVREUR')">
                    <a class="nav-link" href="/Livreur">Livreur</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenu principal -->
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0"><i class="fas fa-eye me-2"></i><span th:text="${'Commande de ' + commande.pointDeVente}"></span><a th:href="@{/commande/imprimer(id=${commande.id})}" class="btn btn-outline-light float-end">
                <i class="fas fa-print"></i> Imprimer
            </a></h1>

        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label" >Date de la Commande:</label>
                    <p th:text="${commande.dateCommande}"></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Point de Vente:</label>
                    <p th:text="${commande.pointDeVente}"></p>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header bg-light">
                    <h3 class="h5 mb-0">Produits Commandés</h3>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Produit</th>
                            <th>Quantité</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produit : ${produitsAvecNoms}">
                            <td th:text="${produit.key.nom}"></td>
                            <td th:text="${produit.value}"></td>
                        </tr>
                        </tbody>
                        <tfoot>
                        <tr>
                            <th>Total</th>
                            <th th:text="${commande.coutTotal +' XAF'}"> </th>
                        </tr>
                        </tfoot>
                    </table>

                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/commandes" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Retour
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
