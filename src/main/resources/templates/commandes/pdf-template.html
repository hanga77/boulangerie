<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Détails de la Commande</title>
    <style>
        /* Styles de base */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .details {
            margin-bottom: 20px;
        }
        .details p {
            margin: 5px 0;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .table th, .table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .table th {
            background-color: #f2f2f2;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- En-tête -->
    <div class="header">
        <h1 th:text="${'Commande de ' + commande.pointDeVente}"></h1>
    </div>

    <!-- Informations de la commande -->
    <div class="details">
        <p><strong>ID de la Commande:</strong> <span th:text="${commande.id}"></span></p>
        <p><strong>Date de la Commande:</strong> <span th:text="${commande.dateCommande}"></span></p>
        <p><strong>Point de Vente:</strong> <span th:text="${commande.pointDeVente}"></span></p>
        <p><strong>Coût Total:</strong> <span th:text="${commande.coutTotal +' XAF'}"></span></p>
        <p><strong>Utilisateur:</strong> <span th:text="${user.username}"></span></p>
    </div>

    <!-- Tableau des produits -->
    <h4>Produits Commandés</h4>
    <table class="table">
        <thead>
        <tr>
            <th>Produit</th>
            <th>Quantité</th>
            <th>Prix Unitaire</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="produit : ${produitsAvecNoms}">
            <td th:text="${produit.key.nom}"></td>
            <td th:text="${produit.value}"></td>
            <td th:text="${produit.key.prix}"></td>
            <td th:text="${produit.value * produit.key.prix }"></td>
        </tr>
        </tbody>
    </table>

    <!-- Pied de page -->
    <div class="footer">
        Merci pour votre commande ! | <span th:text="${appName}"></span>
    </div>
</div>
</body>
</html>
