<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Modifier une Commande')}">
</head>
<body>
<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<!-- Contenu principal -->
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0"><i class="fas fa-plus-circle me-2"></i>Créer une Commande</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/commandes/update/{id}(id=${commandeDTO.id})}" th:object="${commandeDTO}" method="post">
                <div class="mb-3">
                    <label for="dateCommande">Date de la Commande:</label>
                    <input type="date" id="dateCommande" th:field="*{dateCommande}" class="form-control" required />
                    <div class="text-danger" th:if="${#fields.hasErrors('dateCommande')}" th:errors="*{dateCommande}"></div>
                </div>
                <div class="mb-3">
                    <label for="pointDeVenteId">Point de Vente:</label>
                    <select id="pointDeVenteId" th:field="*{pointDeVenteId}" class="form-select" required>
                        <option value="">-- Choisir un point de vente --</option>
                        <option th:each="pdv : ${pointsDeVente}"
                                th:value="${pdv.id}"
                                th:text="${pdv.nom}"></option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('pointDeVenteId')}" th:errors="*{pointDeVenteId}"></div>
                </div>
                <div class="mb-3">
                    <label for="guichetId">Guichet (optionnel):</label>
                    <select id="guichetId" th:field="*{guichetId}" class="form-select">
                        <option value="">-- Aucun guichet --</option>
                        <option th:each="g : ${guichets}"
                                th:value="${g.id}"
                                th:text="${g.nomPointDeVente + ' › ' + g.nom}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <h3>Produits Commandés</h3>
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                        <tr>
                            <th>Produit</th>
                            <th>Quantité</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produit : ${produits}">
                            <td th:text="${produit.nom}"></td>
                            <td>
                                <input type="number" th:name="|produitsCommandes[${produit.id}]|" class="form-control" min="0" th:value="${commandeDTO.produitsCommandes[produit.id]}" />
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i>Enregistrer</button>
                <a href="/commandes" class="btn btn-secondary mt-3">Retour à la liste</a>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
