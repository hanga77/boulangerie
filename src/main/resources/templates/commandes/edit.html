<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <title>Créer une Commande</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pour les icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Styles personnalisés -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-bread-slice me-2"></i>Boulangerie Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link " href="/dashboard">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/matieres-premieres">Matières Premières</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/produits">Produits</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/commandes">Commandes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/livraisons">Livraisons</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/production">Productions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/#">Finances</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/mouvements">
                        <i class="fas fa-warehouse me-1"></i>Mouvements de Stock
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin/users">Admin</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BOULANGER')">
                    <a class="nav-link" href="/Boulanger">Boulanger</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIVREUR')">
                    <a class="nav-link" href="/Livreur">Livreur</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenu principal -->
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0"><i class="fas fa-plus-circle me-2"></i>Créer une Commande</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/commandes/update/{id}(id=${commandeDTO.id})}" th:object="${commandeDTO}" method="post">
                <div class="form-group">
                    <label for="dateCommande">Date de la Commande:</label>
                    <input type="date" id="dateCommande" th:field="*{dateCommande}" class="form-control" required />
                </div>
                <div class="form-group">
                    <label for="pointDeVente">Point de Vente:</label>
                    <input type="text" id="pointDeVente" th:field="*{pointDeVente}" class="form-control" required />
                </div>
                <div class="form-group">
                    <h3>Produits Commandés</h3>
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>Produit</th>
                            <th>Quantité</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="produit : ${produits}">
                            <td th:text="${produit.nom}"></td>
                            <td>
                                <input type="number" th:name="|produitsCommandes[${produit.id}]|" class="form-control" min="0" th:value="${commandeDTO.produitsCommandes[produit.id]}" />
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="/commandes" class="btn btn-secondary mt-3">Retour à la liste</a>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
