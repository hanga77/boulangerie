<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Liste des Produits')}">
</head>
<body>
<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<!-- Contenu principal -->
<div class="container mt-4">
    <h1 class="mb-4">Liste des Produits</h1>
    <a href="/produits/new" class="btn btn-info mb-3">
        <i class="fas fa-plus me-1"></i>Créer un nouveau produit
    </a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Nombre de Kilos de Farine</th>
            <th>Quantité Attendue</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="produit : ${produits}">
            <td th:text="${produit.id}"></td>
            <td th:text="${produit.nom}"></td>
            <td th:text="${produit.prix}"></td>
            <td th:text="${farineQuantities.get(produit.id)}"></td>
            <td th:text="${produit.quantiteAttendue}"></td>
            <td>
                <a th:href="@{/produits/edit/{id}(id=${produit.id})}" class="btn btn-sm btn-warning me-2">
                    <i class="fas fa-edit"></i> Modifier
                </a>
                <form th:action="@{/produits/delete/{id}(id=${produit.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer ce produit ?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="fas fa-trash"></i> Supprimer
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav aria-label="Page navigation" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/produits(page=${currentPage - 1}, size=${size})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/produits(page=${i}, size=${size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/produits(page=${currentPage + 1}, size=${size})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
