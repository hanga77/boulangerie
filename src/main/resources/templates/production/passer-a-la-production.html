<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Passer à la production - Boulangerie')}">
</head>
<body>
<!-- Navbar identique à la page précédente -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <i class="fas fa-play-circle me-2"></i>Passer à la production
        </div>
        <div class="card-body">
            <form action="/production/passer-a-la-production" method="post">
                <div class="form-group">
                    <label for="date">Date de production :</label>
                    <input type="date" id="date" name="date" class="form-control" th:value="${dateActuelle}" readonly required>
                </div>
                <button type="submit" class="btn btn-success mt-3">
                    <i class="fas fa-play me-1"></i>Démarrer la production
                </button>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
