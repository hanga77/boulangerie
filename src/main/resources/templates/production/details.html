<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Détails de la Production - Boulangerie')}">
</head>
<body>
<!-- Navbar identique à la page précédente -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Détails de la Production</h1>
    <p>Date de production: <span th:text="${production.dateProduction}"></span></p>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <i class="fas fa-boxes me-2"></i>Produits produits
                </div>
                <div class="card-body">
                    <ul class="list-group">
                        <li class="list-group-item" th:each="entry : ${production.produitsProduits}">
                            <span th:text="${produits.get(entry.key).nom}"></span> - Quantité produite: <span th:text="${entry.value}"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-secondary text-white">
                    <i class="fas fa-tools me-2"></i>Matières premières utilisées
                </div>
                <div class="card-body">
                    <ul class="list-group">
                        <li class="list-group-item" th:each="entry : ${production.matieresPremieresUtilisees}">
                            <span th:text="${matiere.get(entry.key).nom}"></span> -
                            Quantité théorique: <span th:text="${entry.value}"></span> -
                            Quantité réelle: <span th:text="${production.quantitesReellesUtilisees[entry.key]}"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header bg-warning text-white">
            <i class="fas fa-box-open me-2"></i>Produits restants
        </div>
        <div class="card-body">
            <ul class="list-group">
                <li class="list-group-item" th:each="entry : ${production.produitsRestants}">
                    <span th:text="${produits.get(entry.key).nom}"></span> - Quantité restante: <span th:text="${entry.value}"></span>
                </li>
            </ul>
        </div>
    </div>

    <a th:href="@{/production}" class="btn btn-primary">
        <i class="fas fa-arrow-left me-1"></i>Retour à la liste des productions
    </a>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
