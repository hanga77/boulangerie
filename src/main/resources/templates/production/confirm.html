<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Confirmation de Production - Boulangerie')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Confirmation de Production</h1>
    <p>Date de production: <span th:text="${production.dateProduction}"></span></p>

    <div th:if="${warning}" class="alert alert-warning" th:text="${warning}"></div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <i class="fas fa-boxes me-2"></i>Produits à produire
                </div>
                <div class="card-body">
                    <ul class="list-group">
                        <li class="list-group-item" th:each="entry : ${production.produitsProduits}">
                            <span th:text="${produits.get(entry.key).nom}"></span> - Quantité: <span th:text="${entry.value}"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-secondary text-white">
                    <i class="fas fa-tools me-2"></i>Matières premières nécessaires
                </div>
                <div class="card-body">
                    <ul class="list-group">
                        <li class="list-group-item" th:each="entry : ${production.matieresPremieresUtilisees}">
                            <span th:text="${matieres.get(entry.key).nom}"></span> - Quantité théorique: <span th:text="${entry.value}"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/production/valider-production}" method="post">
        <input type="hidden" th:name="productionId" th:value="${production.id}" readonly required />
        <div class="card mb-4">
            <div class="card-header bg-warning text-white">
                <i class="fas fa-edit me-2"></i>Saisir les quantités réelles
            </div>
            <div class="card-body">
                <h3>Matières premières utilisées</h3>
                <ul class="list-group mb-3">
                    <li class="list-group-item" th:each="entry : ${production.matieresPremieresUtilisees}">
                        <label th:text="${matieres.get(entry.key).nom}"></label>
                        <input type="number" class="form-control" th:name="'quantitesReellesMatieres[' + ${entry.key} + ']'" th:value="${entry.value}">
                    </li>
                </ul>
                <h3>Produits produits</h3>
                <ul class="list-group">
                    <li class="list-group-item" th:each="entry : ${production.produitsProduits}">
                        <label th:text="${produits.get(entry.key).nom}"></label>
                        <input type="number" class="form-control" th:name="'quantitesReellesProduits[' + ${entry.key} + ']'" th:value="${entry.value}">
                    </li>
                </ul>
            </div>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fas fa-check me-1"></i>Valider la production
        </button>
    </form>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
