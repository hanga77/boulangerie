<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Productions Précédentes - Boulangerie')}">
</head>
<body>
<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Productions Précédentes</h1>

    <!-- Formulaire de filtrage -->
    <form th:action="@{/production/previous}" method="get" class="mb-4">
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                    <label for="startDate">Date de début:</label>
                    <input type="date" id="startDate" name="startDate" class="form-control" th:value="${startDate}"/>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label for="endDate">Date de fin:</label>
                    <input type="date" id="endDate" name="endDate" class="form-control" th:value="${endDate}"/>
                </div>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-info">
                    <i class="fas fa-filter me-1"></i>Filtrer
                </button>
            </div>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Date</th>
                <th>Produit</th>
                <th>Quantité Commandée</th>
                <th>Quantité Produite</th>
                <th>Matières Premières (Théorique)</th>
                <th>Matières Premières (Réelle)</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="production : ${productions}">
                <td th:text="${production.dateProduction}"></td>
                <td th:text="${production.produitsProduits.keySet().iterator().next().nom}"></td>
                <td th:text="${production.quantiteCommandee}"></td>
                <td th:text="${production.produitsProduits.values().iterator().next()}"></td>
                <td>
                    <ul>
                        <li th:each="matiere : ${production.matieresPremieresUtilisees}">
                            <span th:text="${matiere.key.nom}"></span> : <span th:text="${matiere.value}"></span>
                        </li>
                    </ul>
                </td>
                <td>
                    <ul>
                        <li th:each="matiere : ${production.quantitesReellesUtilisees}">
                            <span th:text="${matiere.key.nom}"></span> : <span th:text="${matiere.value}"></span>
                        </li>
                    </ul>
                </td>
                <td>
                    <a class="btn btn-info" th:href="@{/production/details/{id}(id=${production.id})}"><i class="fas fa-eye me-1"></i> Voir</a>
                    <a class="btn btn-info no-print" th:href="@{/production/print/{id}(id=${production.id})}"><i class="fas fa-print me-1"></i> Imprimer</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav aria-label="Page navigation" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/production(page=${currentPage - 1}, size=${size})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/production(page=${i}, size=${size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/production(page=${currentPage + 1}, size=${size})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
