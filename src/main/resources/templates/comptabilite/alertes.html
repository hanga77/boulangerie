<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Alertes')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-bell me-2"></i>Alertes</h1>
        <a href="/comptabilite/dashboard" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour au dashboard
        </a>
    </div>

    <div th:if="${#lists.isEmpty(alertes)}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i>Aucune alerte active. Tout est en ordre.
    </div>

    <div th:unless="${#lists.isEmpty(alertes)}" class="list-group">
        <div th:each="alerte : ${alertes}"
             th:class="'list-group-item list-group-item-action mb-2 rounded border-start border-4 '
                       + (${alerte.niveau == 'CRITICAL'} ? 'border-danger'
                          : (${alerte.niveau == 'WARNING'} ? 'border-warning'
                             : 'border-info'))">
            <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                    <div class="d-flex align-items-center mb-1">
                        <i th:class="'fas me-2 '
                                     + (${alerte.niveau == 'CRITICAL'} ? 'fa-exclamation-circle text-danger'
                                        : (${alerte.niveau == 'WARNING'} ? 'fa-exclamation-triangle text-warning'
                                           : 'fa-info-circle text-info'))"></i>
                        <span class="badge me-2"
                              th:text="${alerte.niveau}"
                              th:class="'badge me-2 '
                                        + (${alerte.niveau == 'CRITICAL'} ? 'bg-danger'
                                           : (${alerte.niveau == 'WARNING'} ? 'bg-warning text-dark'
                                              : 'bg-info'))"></span>
                        <span class="badge bg-secondary me-2" th:text="${alerte.type}"></span>
                        <small class="text-muted" th:text="${alerte.dateCreation}"></small>
                    </div>
                    <p class="mb-0" th:text="${alerte.message}"></p>
                </div>
                <div class="ms-3">
                    <span th:if="${alerte.vue}" class="badge bg-success">Lue</span>
                    <span th:unless="${alerte.vue}" class="badge bg-secondary">Non lue</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
