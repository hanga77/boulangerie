<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Factures')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-file-alt me-2"></i>Factures</h1>
        <a href="/comptabilite/dashboard" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour au dashboard
        </a>
    </div>

    <!-- Formulaire d'ajout -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <i class="fas fa-plus-circle me-2"></i>Nouvelle facture
        </div>
        <div class="card-body">
            <form th:action="@{/comptabilite/factures}" th:object="${newFacture}" method="post">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label for="numero" class="form-label">N° Facture</label>
                        <input type="text" class="form-control" id="numero" th:field="*{numero}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></div>
                    </div>
                    <div class="col-md-2">
                        <label for="type" class="form-label">Type</label>
                        <select class="form-select" id="type" th:field="*{type}" required>
                            <option value="">-- Choisir --</option>
                            <option value="VENTE">Vente</option>
                            <option value="ACHAT">Achat</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="montantHT" class="form-label">Montant HT (XAF)</label>
                        <input type="number" step="1" class="form-control" id="montantHT" th:field="*{montantHT}" min="0" required>
                    </div>
                    <div class="col-md-2">
                        <label for="montantTVA" class="form-label">TVA (XAF)</label>
                        <input type="number" step="1" class="form-control" id="montantTVA" th:field="*{montantTVA}" min="0" value="0">
                    </div>
                    <div class="col-md-2">
                        <label for="dateEmission" class="form-label">Date émission</label>
                        <input type="date" class="form-control" id="dateEmission" th:field="*{dateEmission}" required>
                    </div>
                    <div class="col-md-2">
                        <label for="dateEcheance" class="form-label">Date échéance</label>
                        <input type="date" class="form-control" id="dateEcheance" th:field="*{dateEcheance}" required>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Enregistrer
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Liste des factures -->
    <div class="card">
        <div class="card-header bg-secondary text-white">
            <i class="fas fa-list me-2"></i>Liste des factures
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>N° Facture</th>
                        <th>Type</th>
                        <th>Montant HT</th>
                        <th>TVA</th>
                        <th>Montant TTC</th>
                        <th>Émission</th>
                        <th>Échéance</th>
                        <th>Statut</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="facture : ${factures}">
                        <td th:text="${facture.numero}"></td>
                        <td>
                            <span th:text="${facture.type}"
                                  th:class="${facture.type == 'VENTE'} ? 'badge bg-success' : 'badge bg-warning text-dark'"></span>
                        </td>
                        <td th:text="${facture.montantHT + ' XAF'}"></td>
                        <td th:text="${facture.montantTVA + ' XAF'}"></td>
                        <td class="fw-bold" th:text="${facture.montantTTC + ' XAF'}"></td>
                        <td th:text="${facture.dateEmission}"></td>
                        <td th:text="${facture.dateEcheance}"></td>
                        <td>
                            <span th:text="${facture.statut}"
                                  th:class="${facture.statut == 'PAYEE'} ? 'badge bg-success' : 'badge bg-danger'"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(factures)}">
                        <td colspan="8" class="text-center text-muted py-4">Aucune facture enregistrée.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
