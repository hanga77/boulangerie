<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('KPIs')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-chart-line me-2"></i>Indicateurs de Performance (KPIs)</h1>
        <a href="/comptabilite/dashboard" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour au dashboard
        </a>
    </div>

    <div th:if="${#maps.isEmpty(kpisParCategorie)}" class="alert alert-info">
        <i class="fas fa-info-circle me-2"></i>Aucun KPI enregistré pour le moment.
    </div>

    <div th:unless="${#maps.isEmpty(kpisParCategorie)}">
        <div th:each="entry : ${kpisParCategorie}" class="mb-4">
            <h4 class="text-uppercase text-muted border-bottom pb-2 mb-3"
                th:text="${entry.key}">Catégorie</h4>
            <div class="row">
                <div class="col-md-3 col-sm-6 mb-3" th:each="kpi : ${entry.value}">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body text-center">
                            <p class="text-muted small mb-1" th:text="${kpi.nom}"></p>
                            <h3 class="fw-bold text-primary mb-0">
                                <span th:text="${#numbers.formatDecimal(kpi.valeur, 1, 2)}"></span>
                                <small class="fs-6 text-muted" th:text="${kpi.unite}"></small>
                            </h3>
                            <p class="text-muted small mt-2 mb-0" th:text="${kpi.date}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
