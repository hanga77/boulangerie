<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Gestion des utilisateurs')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container">
    <h1>Gestion des utilisateurs</h1>

    <!-- Tableau des utilisateurs -->
    <table class="table">
        <thead>
        <tr>
            <th>Username</th>
            <th>Rôle</th>
            <th>Statut</th>
            <th>Date de création</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td>
                <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post">
                    <select name="role" onchange="this.form.submit()">
                        <option value="BOULANGER" th:selected="${user.role == 'BOULANGER'}">Boulanger</option>
                        <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                    </select>
                </form>
            </td>
            <td th:text="${user.active ? 'Actif' : 'Inactif'}"></td>
            <td th:text="${#temporals.format(user.creationDate, 'dd-MM-yyyy HH:mm')}"></td>
            <td>
                <form th:if="${!user.active}" th:action="@{/admin/users/{id}/activate(id=${user.id})}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-success">Activer</button>
                </form>
                <form th:action="@{/admin/users/{id}(id=${user.id})}" method="post" style="display: inline;"
                      onsubmit="return confirm('Supprimer cet utilisateur ?')">
                    <input type="hidden" name="_method" value="DELETE"/>
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-1"></i>Supprimer
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="mt-3">
        <a href="/admin/users/inactive" class="btn btn-info">
            <i class="fas fa-arrow-left"></i> Voir les utilisateurs inactifs
        </a>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
