<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Utilisateurs en attente d\'activation')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container">
    <!-- Message d'erreur -->
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Message de succès -->
    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}"></span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Utilisateurs en attente d'activation</h2>
        </div>
        <div class="card-body">
            <!-- Si aucun utilisateur inactif -->
            <div th:if="${#lists.isEmpty(inactiveUsers)}" class="alert alert-info">
                Aucun utilisateur en attente d'activation.
            </div>

            <!-- Liste des utilisateurs inactifs -->
            <div th:if="${!#lists.isEmpty(inactiveUsers)}" class="table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Nom d'utilisateur</th>
                        <th>Date de création</th>
                        <th>Rôle</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${inactiveUsers}">
                        <td th:text="${user.username}"></td>
                        <td th:text="${#temporals.format(user.creationDate, 'dd-MM-yyyy HH:mm')}"></td>
                        <td>
                            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="form-inline">
                                <select name="role" class="form-control form-control-sm">
                                    <option value="BOULANGER" th:selected="${user.role == 'BOULANGER'}">Boulanger</option>
                                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Administrateur</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-secondary ml-2">
                                    Modifier le rôle
                                </button>
                            </form>
                        </td>
                        <td>
                            <div class="btn-group">
                                <form th:action="@{/admin/users/{id}/activate(id=${user.id})}" method="post" style="display: inline;">
                                    <button type="submit" class="btn btn-success btn-sm">
                                        <i class="fas fa-check"></i> Activer
                                    </button>
                                </form>
                                <form th:action="@{/admin/users/{id}(id=${user.id})}" method="post" style="display: inline;">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet utilisateur ?')">
                                        <i class="fas fa-trash"></i> Supprimer
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bouton de retour -->
    <div class="mt-3">
        <a href="/admin/users" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </div>
</div>
</body>
</html>
