<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ventes Libres')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-store me-2"></i>Ventes Libres</h1>
        <a href="/ventes-libres/new" class="btn btn-success">
            <i class="fas fa-plus me-1"></i>Nouvelle vente libre
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Production</th>
                        <th>Vendeur</th>
                        <th>Montant Total</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="vente : ${ventesLibres}">
                        <td th:text="${vente.id}"></td>
                        <td th:text="${#temporals.format(vente.dateVente, 'dd/MM/yyyy')}"></td>
                        <td>
                            <a th:href="@{/production/details/{id}(id=${vente.productionId})}"
                               class="text-decoration-none">
                                Prod. #<span th:text="${vente.productionId}"></span>
                            </a>
                        </td>
                        <td th:text="${vente.vendeurUsername}"></td>
                        <td class="fw-bold" th:text="${vente.montantTotal + ' XAF'}"></td>
                        <td>
                            <a th:href="@{/ventes-libres/{id}(id=${vente.id})}"
                               class="btn btn-sm btn-info">
                                <i class="fas fa-eye me-1"></i>Détails
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ventesLibres)}">
                        <td colspan="6" class="text-center text-muted py-4">Aucune vente libre enregistrée.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
