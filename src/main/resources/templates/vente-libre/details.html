<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Détail Vente Libre')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-store me-2"></i>Vente Libre #<span th:text="${vente.id}"></span></h1>
        <a href="/ventes-libres" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour à la liste
        </a>
    </div>

    <!-- Info card -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <i class="fas fa-info-circle me-2"></i>Informations
                </div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5">Date</dt>
                        <dd class="col-sm-7" th:text="${#temporals.format(vente.dateVente, 'dd/MM/yyyy')}"></dd>
                        <dt class="col-sm-5">Production</dt>
                        <dd class="col-sm-7">
                            <a th:href="@{/production/details/{id}(id=${vente.productionId})}">
                                Prod. #<span th:text="${vente.productionId}"></span>
                            </a>
                        </dd>
                        <dt class="col-sm-5">Vendeur</dt>
                        <dd class="col-sm-7" th:text="${vente.vendeurUsername}"></dd>
                        <dt class="col-sm-5">Montant total</dt>
                        <dd class="col-sm-7 fw-bold text-success"
                            th:text="${vente.montantTotal + ' XAF'}"></dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>

    <!-- Produits vendus -->
    <div class="card">
        <div class="card-header bg-secondary text-white">
            <i class="fas fa-box me-2"></i>Produits vendus
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Produit</th>
                        <th>Prix unitaire</th>
                        <th>Quantité</th>
                        <th>Sous-total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${vente.produitsVendus}">
                        <td th:text="${vente.nomsProduits[entry.key]}"></td>
                        <td th:text="${vente.prixProduits[entry.key] + ' XAF'}"></td>
                        <td th:text="${entry.value}"></td>
                        <td th:text="${(vente.prixProduits[entry.key] * entry.value) + ' XAF'}"></td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr class="table-light fw-bold">
                        <td colspan="3" class="text-end">Total</td>
                        <td th:text="${vente.montantTotal + ' XAF'}"></td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
