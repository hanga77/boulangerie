<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Retirer du Stock')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Retirer du Stock</h1>
    <form th:action="@{/matieres-premieres/remove-stock}" method="post">
        <input type="hidden" name="id" th:value="${matierePremiere.id}">
        <div class="mb-3">
            <label for="quantite" class="form-label">Quantité à retirer</label>
            <input type="number" class="form-control" id="quantite" name="quantite" required>
        </div>
        <button type="submit" class="btn btn-info">
            <i class="fas fa-minus me-1"></i>Retirer
        </button>
        <a href="/matieres-premieres" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour
        </a>
    </form>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
