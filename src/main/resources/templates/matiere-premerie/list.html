<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Liste des Matières Premières')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Liste des Matières Premières</h1>
    <a href="/matieres-premieres/new" class="btn btn-primary mb-3">
        <i class="fas fa-plus me-1"></i>Ajouter une Matière Première
    </a>
    <div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>

            <th>Nom</th>
            <th>Quantité en stock</th>
            <th>Unité de mesure</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="matiere : ${matieresPremieres}">
            <td th:text="${matiere.nom}"></td>
            <td th:text="${matiere.stock}"></td>
            <td th:text="${matiere.uniteMesure}"></td>
            <td>
                <a th:href="@{/matieres-premieres/edit/{id}(id=${matiere.id})}" class="btn btn-sm btn-warning me-2">
                    <i class="fas fa-edit"></i> Modifier
                </a>
                <form th:action="@{/matieres-premieres/delete/{id}(id=${matiere.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer cette matière première ?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="fas fa-trash"></i> Supprimer
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
    <!-- Pagination -->
    <nav aria-label="Page navigation" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/matieres-premieres(page=${currentPage - 1}, size=${size})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/matieres-premieres(page=${i}, size=${size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/matieres-premieres(page=${currentPage + 1}, size=${size})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
