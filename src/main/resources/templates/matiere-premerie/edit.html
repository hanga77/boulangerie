<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Modifier une Matière Première')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Modifier une Matière Première</h1>
    <form th:action="@{/matieres-premieres/update/{id}(id=${matierePremiere.id})}" th:object="${matierePremiere}" method="post">
        <div class="mb-3">
            <label for="nom" class="form-label">Nom</label>
            <input type="text" class="form-control" id="nom" th:field="*{nom}" required>
            <div class="text-danger" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
        </div>
        <div class="mb-3">
            <label for="uniteMesure" class="form-label">Unité de mesure</label>
            <input type="text" class="form-control" id="uniteMesure" th:field="*{uniteMesure}" required>
            <div class="text-danger" th:if="${#fields.hasErrors('uniteMesure')}" th:errors="*{uniteMesure}"></div>
        </div>
        <div class="mb-3">
            <label for="stockMinimum" class="form-label">Stock minimum</label>
            <input type="number" class="form-control" id="stockMinimum" th:field="*{stockMinimum}" required>
            <div class="text-danger" th:if="${#fields.hasErrors('stockMinimum')}" th:errors="*{stockMinimum}"></div>
        </div>
        <button type="submit" class="btn btn-info">
            <i class="fas fa-save me-1"></i>Enregistrer
        </button>
        <a href="/matieres-premieres" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour
        </a>
    </form>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
