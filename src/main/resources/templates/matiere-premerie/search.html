<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Résultats de la Recherche')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Résultats de la Recherche</h1>
    <a href="/matieres-premieres" class="btn btn-secondary mb-3">
        <i class="fas fa-arrow-left me-1"></i>Retour à la liste
    </a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Quantité</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="matiere : ${matieresPremieres}">
            <td th:text="${matiere.id}"></td>
            <td th:text="${matiere.nom}"></td>
            <td th:text="${matiere.quantite}"></td>
            <td>
                <a th:href="@{/matieres-premieres/edit/{id}(id=${matiere.id})}" class="btn btn-sm btn-warning me-2">
                    <i class="fas fa-edit"></i> Modifier
                </a>
                <form th:action="@{/matieres-premieres/delete/{id}(id=${matiere.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer cette matière première ?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="fas fa-trash"></i> Supprimer
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
