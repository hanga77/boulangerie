<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <title>Résultats de la Recherche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-bread-slice me-2"></i>Boulangerie Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link " href="/dashboard">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/matieres-premieres">Matières Premières</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/produits">Produits</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/commandes">Commandes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/livraisons">Livraisons</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/production">Productions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/#">Finances</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/mouvements">
                        <i class="fas fa-warehouse me-1"></i>Mouvements de Stock
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin/users">Admin</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BOULANGER')">
                    <a class="nav-link" href="/Boulanger">Boulanger</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIVREUR')">
                    <a class="nav-link" href="/Livreur">Livreur</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">Résultats de la Recherche</h1>
    <a href="/matieres-premieres" class="btn btn-secondary mb-3">
        <i class="fas fa-arrow-left me-1"></i>Retour à la liste
    </a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Quantité</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="matiere : ${matieresPremieres}">
            <td th:text="${matiere.id}"></td>
            <td th:text="${matiere.nom}"></td>
            <td th:text="${matiere.quantite}"></td>
            <td>
                <a th:href="@{/matieres-premieres/edit/{id}(id=${matiere.id})}" class="btn btn-sm btn-warning me-2">
                    <i class="fas fa-edit"></i> Modifier
                </a>
                <a th:href="@{/matieres-premieres/delete/{id}(id=${matiere.id})}" class="btn btn-sm btn-danger">
                    <i class="fas fa-trash"></i> Supprimer
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
