<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ajouter du Stock')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h1 class="h3 mb-0"><i class="fas fa-plus-circle me-2"></i>Ajouter du Stock</h1>
        </div>
        <div class="card-body">
            <form th:action="@{/matieres-premieres/add-stock}" method="post">
                <input type="hidden" name="id" th:value="${matierePremiere.id}">
                <div class="mb-3">
                    <label class="form-label fw-semibold" th:text="${matierePremiere.nom}"></label>
                    <p class="text-muted small mb-0">Stock actuel : <strong th:text="${matierePremiere.stock}"></strong></p>
                </div>
                <div class="mb-3">
                    <label for="quantite" class="form-label">Quantité à ajouter</label>
                    <input type="number" step="0.01" min="0.01" class="form-control" id="quantite" name="quantite" required>
                </div>
                <div class="mb-3">
                    <label for="prixUnitaire" class="form-label">Prix unitaire (XAF)</label>
                    <input type="number" step="1" min="1" class="form-control" id="prixUnitaire" name="prixUnitaire" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a th:href="@{/matieres-premieres}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Retour
                    </a>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-plus me-1"></i>Ajouter
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
