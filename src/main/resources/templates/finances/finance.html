<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Gestion Financière')}">
</head>
<body>
<!-- Navbar -->
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<!-- Contenu principal -->
<div class="container mt-4">
    <h1 class="mb-4">Gestion Financière</h1>
    <p class="lead">Visualisez et gérez les transactions financières de la boulangerie.</p>

    <!-- Bouton d'impression -->
    <button class="btn btn-primary mb-3" onclick="window.print()">
        <i class="fas fa-print me-1"></i>Imprimer
    </button>

    <!-- Liste des transactions financières -->
    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
            <i class="fas fa-list-alt me-2"></i>Transactions Financières
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Montant</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="transaction : ${transactions}">
                    <td th:text="${transaction.date}"></td>
                    <td th:text="${transaction.type}"></td>
                    <td th:text="${transaction.description}"></td>
                    <td th:text="${transaction.montant} + ' €'"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <nav aria-label="Page navigation" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/finances(page=${currentPage - 1}, size=${size})}" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/finances(page=${i}, size=${size})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/finances(page=${currentPage + 1}, size=${size})}" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Résumé financier -->
    <div class="card mb-4">
        <div class="card-header bg-info text-white">
            <i class="fas fa-chart-line me-2"></i>Résumé Financier
        </div>
        <div class="card-body">
            <p>Revenus totaux : <span th:text="${revenusTotaux} + ' €'"></span></p>
            <p>Dépenses totales : <span th:text="${depensesTotales} + ' €'"></span></p>
            <p>Profit : <span th:text="${profit} + ' €'"></span></p>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optionnel, pour les fonctionnalités interactives) -->
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
