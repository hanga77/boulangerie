<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Détails de la Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">Boulangerie Dashboard</a>
    </div>
</nav>

<div class="container mt-4">
    <h1>Détails de la Transaction</h1>
    <div class="card">
        <div class="card-header">
            Transaction #<span th:text="${transaction.id}"></span>
        </div>
        <div class="card-body">
            <p class="card-text">Date : <span th:text="${transaction.date}"></span></p>
            <p class="card-text">Type : <span th:text="${transaction.type}"></span></p>
            <p class="card-text">Description : <span th:text="${transaction.description}"></span></p>
            <p class="card-text">Montant : <span th:text="${transaction.montant} + ' €'"></span></p>
        </div>
    </div>
</div>
</body>
</html>
