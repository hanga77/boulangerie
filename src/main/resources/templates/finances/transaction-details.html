<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détails de la Transaction')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1>Détails de la Transaction</h1>
    <div class="card">
        <div class="card-header">
            Transaction #<span th:text="${transaction.id}"></span>
        </div>
        <div class="card-body">
            <p class="card-text">Date : <span th:text="${transaction.date}"></span></p>
            <p class="card-text">Type : <span th:text="${transaction.type}"></span></p>
            <p class="card-text">Description : <span th:text="${transaction.description}"></span></p>
            <p class="card-text">Montant : <span th:text="${transaction.montant} + ' €'"></span></p>
        </div>
    </div>
</div>
</body>
</html>
