<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Créer un Compte Bancaire')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1>Créer un Compte Bancaire</h1>
    <form th:action="@{/compte-bancaire/creer}" method="post">
        <div class="mb-3">
            <label for="nom" class="form-label">Nom du Compte</label>
            <input type="text" class="form-control" id="nom" name="nom" required>
        </div>
        <div class="mb-3">
            <label for="soldeInitial" class="form-label">Solde Initial</label>
            <input type="number" step="0.01" class="form-control" id="soldeInitial" name="soldeInitial" required>
        </div>
        <button type="submit" class="btn btn-primary">Créer</button>
    </form>
</div>
</body>
</html>
