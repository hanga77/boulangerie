<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Détails de la Livraison')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Détails de la Livraison</h1>

    <div class="card mb-4">
        <div class="card-header bg-info text-white">
            <i class="fas fa-info-circle me-2"></i>Informations de la Livraison
        </div>
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${livraison.id}"></span></p>
            <p><strong>Date de Livraison:</strong> <span th:text="${livraison.dateLivraison}"></span></p>
            <p><strong>Client:</strong> <span th:text="${livraison.nomClient}"></span></p>
            <p><strong>Montant Total:</strong> <span th:text="${livraison.montantTotal + ' XAF'}"></span></p>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-secondary text-white">
            <i class="fas fa-boxes me-2"></i>Produits Livrés
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Produit</th>
                    <th>Quantité</th>
                    <th>Prix Unitaire</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="produit : ${livraison.produitsLivres}">
                    <td th:text="${produit.value.nomProduit}"></td>
                    <td th:text="${produit.value.quantite}"></td>
                    <td th:text="${produit.value.prixVente + ' XAF'}"></td>
                    <td th:text="${produit.value.prixVente * produit.value.quantite + ' XAF'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="text-end">
        <a href="/livraisons" class="btn btn-secondary me-2">
            <i class="fas fa-times me-1"></i>Retour
        </a>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
