<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Livraisons par Production')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Livraisons pour la Production du <span th:text="${production.dateProduction}"></span></h1>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Date de Livraison</th>
                <th>Client</th>
                <th>Montant Total</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="livraison : ${livraisons}">
                <td th:text="${livraison.id}"></td>
                <td th:text="${livraison.dateLivraison}"></td>
                <td th:text="${livraison.nomClient}"></td>
                <td th:text="${livraison.montantTotal + ' XAF'}"></td>
                <td>
                    <a th:href="@{/livraisons/{id}(id=${livraison.id})}" class="btn btn-sm btn-primary">
                        <i class="fas fa-eye"></i> Détails
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
