<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <title>Nouvelle Livraison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 0.2em solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border .75s linear infinite;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .debug-section {
            font-family: monospace;
            font-size: 0.875rem;
        }
        .debug-section pre {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 0.25rem;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-bread-slice me-2"></i>Boulangerie Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link " href="/dashboard">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/matieres-premieres">Matières Premières</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/produits">Produits</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/commandes">Commandes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/livraisons">Livraisons</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link " href="/production">Productions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/#">Finances</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/mouvements">
                        <i class="fas fa-warehouse me-1"></i>Mouvements de Stock
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin/users">Admin</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BOULANGER')">
                    <a class="nav-link" href="/Boulanger">Boulanger</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('LIVREUR')">
                    <a class="nav-link" href="/Livreur">Livreur</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">
                        <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    <div class="row mb-4">
        <div class="col">
            <h1>
                <i class="fas fa-truck me-2"></i>
                Nouvelle Livraison
            </h1>
        </div>
    </div>

    <!-- Alert Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Livraison Form -->
    <div class="card">
        <div class="card-body">
            <form th:action="@{/livraisons/save}" method="post" th:object="${livraisonRequest}" id="livraisonForm">
                <!-- Client Information -->
                <div class="mb-4">
                    <h5><i class="fas fa-user me-2"></i>Information Client</h5>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nomClient" class="form-label">Nom du Client</label>
                                <input type="text" class="form-control" id="nomClient" th:field="*{nomClient}"
                                       required placeholder="Entrez le nom du client"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Production Selection -->
                <div class="mb-4">
                    <h5><i class="fas fa-industry me-2"></i>Production</h5>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="productionId" class="form-label">Sélectionner la Production</label>
                                <select class="form-control" id="productionId" th:field="*{productionId}" required>
                                    <option value="">Choisir une production...</option>
                                    <option th:each="production : ${productions}"
                                            th:value="${production.id}"
                                            th:text="${'Production du ' + #temporals.format(production.dateProduction, 'dd/MM/yyyy')}">
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Produits Section -->
                <div class="mb-4">
                    <h5><i class="fas fa-box me-2"></i>Produits</h5>
                    <div id="produitsSection">
                        <!-- Les produits seront chargés ici dynamiquement -->
                    </div>
                </div>

                <!-- Debug Section -->
                <div class="mb-4 debug-section" style="display: none;" id="debugSection">
                    <h5><i class="fas fa-bug me-2"></i>Informations de Débogage</h5>
                    <div id="debugContent"></div>
                </div>

                <!-- Submit Button -->
                <div class="text-end">
                    <a href="/livraisons" class="btn btn-secondary me-2">
                        <i class="fas fa-times me-1"></i>Annuler
                    </a>
                    <button type="submit" class="btn btn-success" id="submitBtn">
                        <i class="fas fa-save me-1"></i>Enregistrer la Livraison
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function loadProduits(productionId) {
        if (!productionId) return;

        const produitsSection = document.getElementById('produitsSection');
        //const debugSection = document.getElementById('debugSection');
        //const debugContent = document.getElementById('debugContent');

        if (!produitsSection) {
            console.error("Element 'produitsSection' non trouvé");
            return;
        }

        produitsSection.innerHTML = `
        <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <p class="mt-2">Chargement des produits...</p>
        </div>
    `;

        fetch(`/livraisons/ajax/production/${productionId}/produits`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Erreur HTTP! statut: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Afficher les données de débogage
                console.log("Données reçues:", data);
                /*debugContent.innerHTML = `
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;*/
                //debugSection.style.display = 'block';

                produitsSection.innerHTML = '';

                if (!data.produitsRestants || Object.keys(data.produitsRestants).length === 0) {
                    produitsSection.innerHTML = `
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Aucun produit disponible pour cette production
                    </div>
                `;
                    return;
                }

                const card = document.createElement('div');
                card.className = 'card';

                const cardBody = document.createElement('div');
                cardBody.className = 'card-body';

                // En-têtes
                const headerRow = document.createElement('div');
                headerRow.className = 'row fw-bold mb-3';
                headerRow.innerHTML = `
                <div class="col-md-3">Produit</div>
                <div class="col-md-4">Quantité Disponible</div>
                <div class="col-md-4">Prix de Vente (Fcfa)</div>
            `;
                cardBody.appendChild(headerRow);

                // Produits
                Object.entries(data.produitsRestants).forEach(([produitId, quantite]) => {
                    const productRow = document.createElement('div');
                    productRow.className = 'row mb-3 align-items-center';

                    // Récupérer le nom du produit
                    const nomProduit = data.nomsProduits[produitId] || `Produit ${produitId}`;

                    productRow.innerHTML = `
                    <div class="col-md-3">
                        <label class="form-label" for="quantite-${produitId}">
                            ${nomProduit.nom}
                        </label>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="number"
                                   class="form-control"
                                   id="quantite-${produitId}"
                                   name="produits[${produitId}].quantite"
                                   min="1"
                                   max="${quantite}"
                                   required
                                   placeholder="${nomProduit.quantiteAttendue}"
                            />
                            <span class="input-group-text">/ ${quantite}</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="number"
                                   class="form-control"
                                   name="produits[${produitId}].prixVente"
                                   placeholder="${nomProduit.prix}"
                                   step="0.01"
                                   min="0"
                                   required
                            />
                            <span class="input-group-text">Fcfa</span>
                        </div>
                    </div>
                `;

                    cardBody.appendChild(productRow);
                });

                card.appendChild(cardBody);
                produitsSection.appendChild(card);
            })
            .catch(error => {
                console.error('Erreur:', error);
                produitsSection.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Erreur lors du chargement des produits: ${error.message}
                </div>
            `;
            });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const productionSelect = document.getElementById('productionId');
        if (productionSelect) {
            productionSelect.addEventListener('change', function() {
                loadProduits(this.value);
            });

            // Charger les produits si une production est déjà sélectionnée
            if (productionSelect.value) {
                loadProduits(productionSelect.value);
            }
        }

        // Validation du formulaire
        const form = document.getElementById('livraisonForm');
        if (form) {
            form.addEventListener('submit', function(event) {
                const productionId = document.getElementById('productionId').value;
                if (!productionId) {
                    event.preventDefault();
                    alert('Veuillez sélectionner une production');
                    return;
                }
            });
        }
    });
</script>
</body>
</html>
