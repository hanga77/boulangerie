<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Liste des Livraisons')}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Liste des Livraisons</h1>

    <!-- Bouton pour créer une nouvelle livraison -->
    <a href="/livraisons/new" class="btn btn-primary mb-4">
        <i class="fas fa-plus me-1"></i>Nouvelle Livraison
    </a>

    <!-- Tableau des livraisons -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Date de Livraison</th>
                <th>Client</th>
                <th>Montant Total</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="livraison, iterStat : ${livraisons}" th:if="${iterStat.index >= (currentPage * size) and iterStat.index < ((currentPage + 1) * size)}">
                <td th:text="${livraison.id}"></td>
                <td th:text="${livraison.dateLivraison}"></td>
                <td th:text="${livraison.nomClient}"></td>
                <td th:text="${livraison.montantTotal + ' XAF'}"></td>
                <td>
                    <a th:href="@{/livraisons/{id}(id=${livraison.id})}" class="btn btn-sm btn-primary">
                        <i class="fas fa-eye"></i> Détails
                    </a>
                    <a th:href="@{/livraisons/{id}/imprimer(id=${livraison.id})}" class="btn btn-sm btn-info">
                        <i class="fas fa-print"></i> Imprimer
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav aria-label="Page navigation" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/livraisons(page=${currentPage - 1}, size=${size})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/livraisons(page=${i}, size=${size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/livraisons(page=${currentPage + 1}, size=${size})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
