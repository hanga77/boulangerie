<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${titre})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0" th:text="${titre}">Point de Vente</h5>
                </div>
                <div class="card-body">
                    <form th:action="${pdv.id != null} ? @{/points-de-vente/update/{id}(id=${pdv.id})} : @{/points-de-vente}"
                          th:object="${pdv}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="nom" class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
                            <input type="text" id="nom" th:field="*{nom}" class="form-control"
                                   th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'" placeholder="Ex: Boutique Centre-Ville"/>
                            <div class="invalid-feedback" th:errors="*{nom}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="type" class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
                            <select id="type" th:field="*{type}" class="form-select"
                                    th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                                <option value="">-- Choisir un type --</option>
                                <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{type}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="adresse" class="form-label fw-semibold">Adresse</label>
                            <input type="text" id="adresse" th:field="*{adresse}" class="form-control"
                                   placeholder="Adresse du point de vente"/>
                        </div>

                        <div th:if="${pdv.id != null}" class="mb-3 form-check">
                            <input type="checkbox" id="actif" th:field="*{actif}" class="form-check-input"/>
                            <label for="actif" class="form-check-label">Actif</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save me-1"></i>Enregistrer
                            </button>
                            <a href="/points-de-vente" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Retour
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
