<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Détails Point de Vente')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">

    <!-- En-tête -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="${pdv.nom}">Point de Vente</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/points-de-vente/edit/{id}(id=${pdv.id})}" class="btn btn-warning">
                <i class="fas fa-edit me-1"></i>Modifier
            </a>
            <a href="/points-de-vente" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i>Retour
            </a>
        </div>
    </div>

    <div class="row">
        <!-- Infos générales -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0"><i class="fas fa-info-circle me-1"></i>Informations</h6>
                </div>
                <div class="card-body">
                    <dl class="mb-0">
                        <dt>Type</dt>
                        <dd><span class="badge bg-secondary" th:text="${pdv.type}"></span></dd>
                        <dt>Adresse</dt>
                        <dd th:text="${pdv.adresse ?: '—'}"></dd>
                        <dt>Statut</dt>
                        <dd>
                            <span th:if="${pdv.actif}" class="badge bg-success">Actif</span>
                            <span th:unless="${pdv.actif}" class="badge bg-danger">Inactif</span>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>

        <!-- Stats CA -->
        <div class="col-md-8 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-success text-white">
                    <h6 class="mb-0"><i class="fas fa-chart-bar me-1"></i>Chiffre d'Affaires</h6>
                </div>
                <div class="card-body">
                    <div class="row text-center">
                        <div class="col-4">
                            <div class="fs-4 fw-bold text-success" th:text="${#numbers.formatDecimal(pdv.chiffreAffairesTotal, 1, 2) + ' FCFA'}"></div>
                            <small class="text-muted">CA Total</small>
                        </div>
                        <div class="col-4">
                            <div class="fs-4 fw-bold text-primary" th:text="${#numbers.formatDecimal(pdv.chiffreAffairesMois, 1, 2) + ' FCFA'}"></div>
                            <small class="text-muted">CA ce mois</small>
                        </div>
                        <div class="col-4">
                            <div class="fs-4 fw-bold text-info" th:text="${pdv.nombreVentes}"></div>
                            <small class="text-muted">Nb. ventes</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Guichets -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="fas fa-cash-register me-1"></i>Guichets</h6>
        </div>
        <div class="card-body">
            <table class="table table-hover mb-3" th:if="${!#lists.isEmpty(pdv.guichets)}">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Nom</th>
                    <th>Statut</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="g : ${pdv.guichets}">
                    <td th:text="${g.numero}"></td>
                    <td th:text="${g.nom}"></td>
                    <td>
                        <span th:if="${g.actif}" class="badge bg-success">Actif</span>
                        <span th:unless="${g.actif}" class="badge bg-secondary">Inactif</span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <form th:action="@{/points-de-vente/guichets/{gid}/supprimer(gid=${g.id})}"
                              method="post" style="display:inline"
                              th:with="pdvId=${pdv.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="pdvId" th:value="${pdv.id}"/>
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Supprimer ce guichet ?')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(pdv.guichets)}" class="text-muted">Aucun guichet enregistré.</p>

            <!-- Formulaire ajout guichet -->
            <hr/>
            <h6 class="mb-3">Ajouter un guichet</h6>
            <form th:action="@{/points-de-vente/{pdvId}/guichets(pdvId=${pdv.id})}"
                  th:object="${newGuichet}" method="post" class="row g-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="col-md-4">
                    <input type="text" th:field="*{nom}" class="form-control" placeholder="Nom du guichet" required/>
                </div>
                <div class="col-md-2">
                    <input type="number" th:field="*{numero}" class="form-control" placeholder="N°" min="1"/>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus me-1"></i>Ajouter
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
