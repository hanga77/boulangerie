<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Points de Vente')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flash-messages}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Points de Vente</h1>
        <a href="/points-de-vente/new" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Nouveau Point de Vente
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>Nom</th>
                <th>Type</th>
                <th>Adresse</th>
                <th>Guichets</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pdv : ${pointsDeVente}">
                <td th:text="${pdv.nom}"></td>
                <td><span class="badge bg-secondary" th:text="${pdv.type}"></span></td>
                <td th:text="${pdv.adresse}"></td>
                <td th:text="${pdv.guichets != null ? pdv.guichets.size() : 0}"></td>
                <td>
                    <span th:if="${pdv.actif}" class="badge bg-success">Actif</span>
                    <span th:unless="${pdv.actif}" class="badge bg-danger">Inactif</span>
                </td>
                <td>
                    <a th:href="@{/points-de-vente/{id}(id=${pdv.id})}" class="btn btn-sm btn-info me-1">
                        <i class="fas fa-eye"></i> Détails
                    </a>
                    <a th:href="@{/points-de-vente/edit/{id}(id=${pdv.id})}" class="btn btn-sm btn-warning me-1">
                        <i class="fas fa-edit"></i> Modifier
                    </a>
                    <form th:action="@{/points-de-vente/{id}/desactiver(id=${pdv.id})}" method="post"
                          style="display:inline" th:if="${pdv.actif}"
                          sec:authorize="hasRole('ADMIN')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-secondary me-1"
                                onclick="return confirm('Désactiver ce point de vente ?')">
                            <i class="fas fa-ban"></i>
                        </button>
                    </form>
                    <form th:action="@{/points-de-vente/{id}/supprimer(id=${pdv.id})}" method="post"
                          style="display:inline"
                          sec:authorize="hasRole('ADMIN')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Supprimer ce point de vente ?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(pointsDeVente)}">
                <td colspan="6" class="text-center text-muted">Aucun point de vente enregistré</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
