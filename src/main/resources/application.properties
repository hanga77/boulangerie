spring.application.name=boulangerie
app.name=Gestion Boulangerie
spring.datasource.url=jdbc:mysql://localhost:3306/boulangerie_bd?createDatabaseIfNotExist=true
spring.datasource.username=jobportal
spring.datasource.password=jobportal

server.port=9000

# Configuration MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


logging.level.org.springframework.security=DEBUG
